<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>SURF MACHINE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@300;400;600;700&family=Rajdhani:wght@300;500;700&display=swap');
:root{
  --gold:#c8a84b;--gold-bright:#f0c84a;--gold-dark:#6a5018;
  --bg:#0d0b08;--cream:#e8d89a;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:none;user-select:none;-webkit-user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Rajdhani',sans-serif;}

/* INIT */
#init{position:fixed;inset:0;z-index:999;background:radial-gradient(ellipse at center,#1e1608,#0d0b08);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:48px;}
#init::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(200,168,75,.03) 2px,rgba(200,168,75,.03) 4px);pointer-events:none;}
.ilogo{text-align:center;}
.ilogo .surf{font-family:'Bebas Neue',sans-serif;font-size:72px;color:var(--gold-bright);text-shadow:0 0 20px #c8a84b,0 0 60px #7a6020;letter-spacing:10px;display:block;}
.ilogo .mach{font-family:'Oswald',sans-serif;font-size:13px;font-weight:300;color:var(--cream);letter-spacing:6px;opacity:.7;display:block;margin-top:6px;text-transform:uppercase;}
#sbtn{width:200px;height:200px;border-radius:50%;background:radial-gradient(circle at 38% 38%,#2a2010,#0d0b08);border:3px solid var(--gold);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;position:relative;overflow:hidden;animation:btnPulse 2.8s ease-in-out infinite;}
#sbtn::after{content:'';position:absolute;inset:7px;border-radius:50%;border:1px solid rgba(200,168,75,.2);pointer-events:none;}
#sbtn:active{transform:scale(.95);animation:none;box-shadow:0 0 20px rgba(200,168,75,.4);}
.bl{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:5px;color:var(--gold-bright);text-shadow:0 0 10px #c8a84b;}
@keyframes btnPulse{
  0%,100%{box-shadow:0 0 25px rgba(200,168,75,.3),0 0 50px rgba(200,168,75,.08);}
  50%    {box-shadow:0 0 50px rgba(200,168,75,.6),0 0 90px rgba(200,168,75,.2);}
}
@keyframes plugIn{
  0%   {transform:translateY(30px);}
  55%  {transform:translateY(-3px);}
  68%  {transform:translateY(2px);}
  80%  {transform:translateY(-1px);}
  90%  {transform:translateY(0.5px);}
  100% {transform:translateY(0);}
}
@keyframes jackFlash{
  0%,52%{opacity:0;}
  60%,100%{opacity:1;}
}
@keyframes cordWiggle{
  0%,54%{transform:rotate(0deg);}
  58%   {transform:rotate(-3deg);}
  62%   {transform:rotate(2deg);}
  66%   {transform:rotate(-1deg);}
  70%,100%{transform:rotate(0deg);}
}
.plug-group{animation:plugIn 2.2s cubic-bezier(.4,0,.2,1) infinite;transform-box:fill-box;transform-origin:center bottom;}
.jack-flash{animation:jackFlash 2.2s ease-out infinite;}
.cord-body{animation:cordWiggle 2.2s ease-out infinite;transform-box:fill-box;transform-origin:50% 0;}

/* APP */
#app{display:none;width:100%;height:100%;flex-direction:column;padding-top:var(--safe-top);padding-bottom:var(--safe-bottom);}
#app.on{display:flex;}

/* HEADER */
.hdr{padding:8px 12px 7px;background:linear-gradient(180deg,#1a1510,#0d0b08);border-bottom:1px solid #2a2010;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.htitle{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:var(--gold);text-shadow:0 0 10px #7a6020;flex-shrink:0;}
.twrap{flex:1;display:flex;flex-direction:column;gap:3px;}
.tlrow{display:flex;justify-content:space-between;align-items:baseline;}
.tlbl{font-size:9px;letter-spacing:3px;color:var(--gold-dark);text-transform:uppercase;}
#tbpm{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--gold-bright);text-shadow:0 0 8px #c8a84b;}
#tslider{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:3px;background:linear-gradient(90deg,var(--gold-dark),var(--gold-bright));outline:none;}
#tslider::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#f0c84a,#7a6020);border:2px solid var(--gold-bright);box-shadow:0 0 8px rgba(200,168,75,.6);}

/* Step counter */
.step-ctrl{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:2px;}
.step-ctrl .tlbl{text-align:center;}
.step-adj{display:flex;align-items:center;gap:4px;}
.step-adj-btn{
  width:44px;height:44px;border-radius:8px;
  background:radial-gradient(circle at 35% 30%,#2e2410,#0d0b08);
  border:2px solid var(--gold-dark);
  color:var(--gold-bright);font-size:22px;font-weight:bold;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;
  box-shadow:0 3px 8px rgba(0,0,0,.5),inset 0 1px 1px rgba(255,255,255,.06);
}
.step-adj-btn:active{transform:scale(.9);box-shadow:0 1px 3px rgba(0,0,0,.5);}
#step-val{
  font-family:'Bebas Neue',sans-serif;font-size:24px;
  color:var(--gold-bright);text-shadow:0 0 8px #c8a84b;
  min-width:30px;text-align:center;
}

/* MAIN */
.main{flex:1;display:flex;min-height:0;}

/* STRING COL */
.scol{width:66px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding:8px 0 6px;background:linear-gradient(180deg,#0d0b08,#120f0a 50%,#0d0b08);border-right:1px solid #1a1510;}
.sclbl{font-size:8px;letter-spacing:2px;color:var(--gold-dark);text-transform:uppercase;margin-bottom:6px;}
#sc{flex:1;width:100%;position:relative;cursor:pointer;}
.sline{position:absolute;left:50%;top:0;bottom:0;width:3px;transform:translateX(-50%);background:linear-gradient(180deg,rgba(200,168,75,.12),var(--gold-bright) 15%,var(--gold) 50%,var(--gold-bright) 85%,rgba(200,168,75,.12));box-shadow:0 0 8px #f0c84a,0 0 20px #c8a84b,0 0 40px #7a6020;border-radius:2px;}
.sline.pluck{animation:svib .15s ease-out;}
@keyframes svib{0%{transform:translateX(-50%)}25%{transform:translateX(calc(-50% + 5px))}50%{transform:translateX(calc(-50% - 3px))}75%{transform:translateX(calc(-50% + 2px))}100%{transform:translateX(-50%)}}
.nzone{position:absolute;left:0;right:0;height:30px;display:flex;align-items:center;cursor:pointer;z-index:2;}
.ndot{width:10px;height:10px;border-radius:50%;background:var(--gold-dark);border:1px solid var(--gold);box-shadow:0 0 6px rgba(200,168,75,.4);position:absolute;left:50%;transform:translateX(-50%);transition:all .08s;z-index:3;}
.nlbl{position:absolute;left:6px;font-family:'Bebas Neue',sans-serif;font-size:13px;color:var(--gold-dark);transition:color .08s;z-index:3;}
.nzone.act .ndot{background:var(--gold-bright);box-shadow:0 0 14px var(--gold),0 0 28px rgba(200,168,75,.5);transform:translateX(-50%) scale(1.5);}
.nzone.act .nlbl{color:var(--gold-bright);text-shadow:0 0 8px var(--gold);}
.loop-prog-wrap{width:44px;height:6px;border-radius:3px;background:#1a1510;border:1px solid var(--gold-dark);margin-top:5px;flex-shrink:0;overflow:hidden;}
.loop-prog-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--gold-dark),var(--gold-bright));border-radius:3px;}

/* NOTE RAND BUTTON */
.note-rand-btn{
  width:52px;height:52px;border-radius:10px;flex-shrink:0;margin-top:6px;
  background:radial-gradient(circle at 35% 30%,#2e2410,#0d0b08);
  border:2px solid var(--gold-dark);
  box-shadow:0 4px 10px rgba(0,0,0,.5),inset 0 1px 1px rgba(255,255,255,.06);
  cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
}
.note-rand-btn:active{transform:scale(.92) translateY(2px);}
.nrb-label{font-size:7px;letter-spacing:1px;color:var(--gold-dark);text-transform:uppercase;}

/* SVG DIE */
.die-svg{display:block;overflow:visible;}

/* PEDAL PANEL */
.ppanel{flex:1;display:flex;flex-direction:column;padding:8px;gap:7px;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.pedal{background:linear-gradient(135deg,#2a1f0e,#1a1208 40%,#221810);border-radius:14px;border:2px solid var(--gold-dark);box-shadow:0 4px 20px rgba(0,0,0,.6),inset 0 1px 1px rgba(200,168,75,.12);padding:9px;position:relative;overflow:hidden;flex-shrink:0;}
.pedal::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(-45deg,transparent,transparent 4px,rgba(200,168,75,.012) 4px,rgba(200,168,75,.012) 5px);border-radius:12px;pointer-events:none;}
.ptbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.pname{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:4px;color:var(--gold);text-shadow:0 0 8px rgba(200,168,75,.4);}
.pled{width:10px;height:10px;border-radius:50%;background:var(--gold-dark);border:1px solid #3a2a10;transition:all .1s;}
.pled.on{background:#f0c84a;box-shadow:0 0 8px #f0c84a,0 0 16px rgba(200,168,75,.5);}

/* drum rows */
.drow{display:flex;align-items:center;gap:5px;margin-bottom:5px;}
.dlbl{font-family:'Oswald',sans-serif;font-size:10px;font-weight:600;letter-spacing:2px;color:var(--cream);text-transform:uppercase;width:34px;flex-shrink:0;opacity:.8;}
.srow{flex:1;display:flex;gap:2px;}
.sbtn{flex:1;height:22px;border-radius:3px;border:1px solid #2a2010;background:#120f0a;cursor:pointer;transition:background .06s;}
.sbtn.on{background:var(--gold);border-color:var(--gold-bright);}
.sbtn.cur{box-shadow:0 0 7px rgba(200,168,75,.9);transform:scaleY(1.12);}
.sbtn.on.cur{background:var(--gold-bright);}
.sbtn.b4{border-left:1px solid #3a3010;}
.sbtn.inactive{opacity:0.2;}

/* sound cycle button */
.sound-cycle-btn{
  height:22px;min-width:44px;padding:0 6px;border-radius:3px;flex-shrink:0;
  background:radial-gradient(circle at 40% 35%,#2e2410,#0d0b08);
  border:1.5px solid var(--gold-dark);
  color:var(--gold);font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:1px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 5px rgba(0,0,0,.4);white-space:nowrap;
}
.sound-cycle-btn:active{transform:scale(.93);box-shadow:0 1px 2px rgba(0,0,0,.4);border-color:var(--gold-bright);color:var(--gold-bright);}

/* die button — minimum 44px */
.die-btn{
  width:44px;height:44px;flex-shrink:0;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle at 35% 30%,#2e2410,#0d0b08);
  border:2px solid var(--gold-dark);border-radius:8px;padding:0;
  box-shadow:0 3px 8px rgba(0,0,0,.4);
}
.die-btn:active{transform:scale(.9) translateY(1px);}

/* stomp row */
.stomp-row{display:flex;align-items:center;justify-content:space-around;margin-top:6px;padding-top:7px;border-top:1px solid rgba(200,168,75,.12);}
.stbtn{width:66px;height:66px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#4a3820,#1a1208);border:3px solid var(--gold-dark);box-shadow:0 6px 16px rgba(0,0,0,.6),inset 0 2px 4px rgba(255,255,255,.07);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;position:relative;}
.stbtn::after{content:'';position:absolute;inset:5px;border-radius:50%;border:1px solid rgba(200,168,75,.18);}
.stbtn:active{transform:scale(.93) translateY(3px);}
.stbtn.on{border-color:var(--gold-bright);box-shadow:0 0 18px rgba(200,168,75,.45),0 6px 12px rgba(0,0,0,.4);}
.stlbl{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:2px;color:var(--gold);line-height:1;}
.stsub{font-size:8px;letter-spacing:2px;color:var(--gold-dark);}

/* rand-all die button — same as die-btn but bigger */
.die-btn-lg{
  width:66px;height:66px;border-radius:50%;
  cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  background:radial-gradient(circle at 35% 30%,#4a3820,#1a1208);
  border:3px solid var(--gold-dark);
  box-shadow:0 6px 16px rgba(0,0,0,.6),inset 0 2px 4px rgba(255,255,255,.07);
  position:relative;
}
.die-btn-lg::after{content:'';position:absolute;inset:5px;border-radius:50%;border:1px solid rgba(200,168,75,.18);}
.die-btn-lg:active{transform:scale(.93) translateY(3px);}
.die-btn-lg .klbl{font-size:7px;letter-spacing:1.5px;color:var(--gold-dark);text-transform:uppercase;}

/* knob row */
.krow{display:flex;justify-content:space-around;align-items:center;margin-top:6px;padding-top:7px;border-top:1px solid rgba(200,168,75,.1);}
.kwrap{display:flex;flex-direction:column;align-items:center;gap:3px;}
.klbl{font-size:8px;letter-spacing:2px;color:var(--gold-dark);text-transform:uppercase;}
.knob{width:40px;height:40px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#3a2e18,#0d0b08);border:2px solid var(--gold-dark);box-shadow:0 4px 8px rgba(0,0,0,.5),inset 0 1px 2px rgba(255,255,255,.07);cursor:pointer;position:relative;}
.knob::after{content:'';position:absolute;width:2px;height:11px;border-radius:1px;background:var(--gold);top:4px;left:50%;transform-origin:bottom center;}

/* toggle button wrapper */
.toggle-btn{background:none;border:none;padding:0;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;min-width:52px;min-height:44px;justify-content:center;}
/* toggle switch */
.switch-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;}
.toggle-switch{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;}
.toggle-track{width:52px;height:28px;border-radius:14px;background:#120f0a;border:2px solid var(--gold-dark);position:relative;transition:background .2s;}
.toggle-track.on{background:var(--gold-dark);}
.toggle-thumb{width:22px;height:22px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#c0c0c0,#606060);border:1px solid #888;box-shadow:0 2px 4px rgba(0,0,0,.5);position:absolute;top:2px;left:2px;transition:left .18s;pointer-events:none;}
.toggle-track.on .toggle-thumb{left:26px;background:radial-gradient(circle at 35% 35%,#f0c84a,#c8a84b);}
.toggle-labels{display:flex;justify-content:space-between;width:52px;font-size:9px;letter-spacing:1px;color:var(--gold-dark);text-transform:uppercase;}

/* status bar */
.sbar{display:flex;align-items:center;padding:5px 10px;background:#0a0805;border-top:1px solid #1a1510;flex-shrink:0;}
.stxt{font-size:9px;letter-spacing:2px;color:var(--gold-dark);text-transform:uppercase;}

/* beat flash */
.bflash{position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse at 33px center,rgba(200,168,75,.1),transparent 50%);opacity:0;transition:opacity .05s;}
.bflash.f{opacity:1;}
</style>
</head>
<body>

<!-- INIT -->
<div id="init">
  <div class="ilogo">
    <span class="surf">HUMVOLT</span>
    <span class="mach">Golden Face Groove Combo</span>
  </div>
  <button id="sbtn">
    <!-- Quarter-inch plug SVG animation -->
    <svg class="plug-svg" width="80" height="90" viewBox="0 0 80 90">
      <!-- Jack socket (static, at top) -->
      <g class="jack-flash">
        <!-- Socket body -->
        <rect x="28" y="8" width="24" height="14" rx="3" fill="#2a2010" stroke="#c8a84b" stroke-width="1.5"/>
        <!-- Socket hole -->
        <ellipse cx="40" cy="15" rx="5" ry="4" fill="#0d0b08" stroke="#6a5018" stroke-width="1"/>
        <!-- Socket ring glow -->
        <ellipse cx="40" cy="15" rx="5" ry="4" fill="none" stroke="#f0c84a" stroke-width="0.8" opacity="0.8"/>
      </g>
      <!-- Plug + cord (animated sliding up) -->
      <g class="plug-group">
        <!-- Cord body -->
        <g class="cord-body">
          <path d="M36 55 Q33 70 35 85" stroke="#1a1208" stroke-width="7" fill="none" stroke-linecap="round"/>
          <path d="M44 55 Q47 70 45 85" stroke="#1a1208" stroke-width="7" fill="none" stroke-linecap="round"/>
          <path d="M36 55 Q33 70 35 85" stroke="#3a3020" stroke-width="4" fill="none" stroke-linecap="round"/>
          <path d="M44 55 Q47 70 45 85" stroke="#3a3020" stroke-width="4" fill="none" stroke-linecap="round"/>
        </g>
        <!-- Barrel / sleeve -->
        <rect x="27" y="36" width="26" height="20" rx="4" fill="#1a1408" stroke="#c8a84b" stroke-width="1.5"/>
        <!-- Barrel grip rings -->
        <line x1="33" y1="38" x2="33" y2="54" stroke="#6a5018" stroke-width="1.5"/>
        <line x1="40" y1="38" x2="40" y2="54" stroke="#6a5018" stroke-width="1.5"/>
        <line x1="47" y1="38" x2="47" y2="54" stroke="#6a5018" stroke-width="1.5"/>
        <!-- Tip shaft -->
        <rect x="36" y="20" width="8" height="18" rx="1" fill="#888" stroke="#aaa" stroke-width="0.5"/>
        <!-- Tip ring (insulator) -->
        <rect x="34" y="30" width="12" height="4" rx="1" fill="#1a1208" stroke="#c8a84b" stroke-width="1"/>
        <!-- Tip end (rounded) -->
        <ellipse cx="40" cy="20" rx="4" ry="2.5" fill="#c0c0c0" stroke="#aaa" stroke-width="0.5"/>
      </g>
    </svg>
    <span class="bl">PLUG IN</span>
  </button>
</div>

<!-- APP -->
<div id="app">
  <div class="bflash" id="bflash"></div>

  <!-- HEADER: title | tempo slider | step counter -->
  <div class="hdr">
    <div class="htitle">HUMVOLT</div>
    <div class="twrap">
      <div class="tlrow"><span class="tlbl">Tempo</span><span id="tbpm">140 BPM</span></div>
      <input type="range" id="tslider" min="60" max="220" value="140">
    </div>
    <div class="step-ctrl">
      <div class="tlbl">STEPS</div>
      <div class="step-adj">
        <button class="step-adj-btn" id="step-dn">−</button>
        <span id="step-val">16</span>
        <button class="step-adj-btn" id="step-up">+</button>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- STRING COLUMN -->
    <div class="scol">
      <div class="sclbl">String</div>
      <div id="sc"><div class="sline" id="sl"></div></div>
      <div class="loop-prog-wrap"><div class="loop-prog-bar" id="lpb"></div></div>
      <button class="note-rand-btn" id="note-rand-btn">
        <span class="nrb-label">NOTES</span>
      </button>
    </div>

    <!-- PEDAL PANEL -->
    <div class="ppanel">

      <!-- RHYTHM DEVIL -->
      <div class="pedal">
        <div style="display:flex;justify-content:flex-end;margin-bottom:4px;"><div class="pled on" id="dled"></div></div>
        <div id="dsec"></div>
        <div class="stomp-row">
          <button class="stbtn on" id="dstmp"><span class="stlbl">DRUMS</span><span class="stsub">ON/OFF</span></button>
          <button class="stbtn" id="drum-fuzz-sw"><span class="stlbl">DRUMS</span><span class="stsub">THRU FUZZ</span></button>
          <button class="stbtn" id="fill-btn"><span class="stlbl">FILL</span><span class="stsub">ON LOOP</span></button>
          <button class="die-btn-lg" id="rall"><span class="klbl">RAND ALL</span></button>
        </div>
      </div>

      <!-- FUZZ BOX -->
      <div class="pedal">
        <div class="ptbar"><span class="pname">FUZZ BOX</span><div class="pled on" id="fled"></div></div>
        <div class="krow">
          <div class="kwrap"><div class="klbl">FUZZ</div><div class="knob" id="kfuzz"></div></div>
          <div class="kwrap"><div class="klbl">TONE</div><div class="knob" id="ktone"></div></div>
          <div class="kwrap"><div class="klbl">VOL</div><div class="knob" id="kvol"></div></div>
          <div class="kwrap"><div class="klbl">REVERB</div><div class="knob" id="krv"></div></div>
        </div>
        <div class="stomp-row">
          <button class="stbtn on" id="fstmp"><span class="stlbl">FUZZ</span><span class="stsub">ON/OFF</span></button>
        </div>
      </div>

    </div>
  </div>

  <div class="sbar"><span class="stxt" id="stxt">Touch string · 4-bar loop always recording</span></div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  SURF MACHINE
// ═══════════════════════════════════════════════════════
var AC, master, verb, verbGain, comp;
var playing = false, drumsOn = true;
var tempo = 140, seqStep = 0, nextTime = 0;
var activeSteps = 16;          // mutable step count 1-16
var MAX_STEPS = 16;
var TICK = 25, AHEAD = 0.12;

var NOTES = [
  {name:'E2',f:82.41},{name:'A2',f:110.00},{name:'B2',f:123.47},

// ── Fuzz chain ─────────────────────────────────────────
var fuzzIn, fuzzWS, fuzzTone, fuzzVol, bypassGain;
var drumFuzzGain, drumDryGain;

function makeFuzzCurve(amount) {
  var n = 512, c = new Float32Array(n);
  for (var i = 0; i < n; i++) {
    var x = (i * 2) / n - 1;
    var d = x * (1 + amount * 8);
    if (d > 1) c[i] = 1;
    else if (d < -0.85) c[i] = -0.85;
    else c[i] = d - (d * d * d) / 3;
  }
  return c;
}

function buildFuzzChain() {
  fuzzIn  = AC.createGain();         fuzzIn.gain.value = 1;
  fuzzWS  = AC.createWaveShaper();   fuzzWS.oversample = '4x';
  fuzzTone= AC.createBiquadFilter(); fuzzTone.type = 'highshelf'; fuzzTone.frequency.value = 1200;
  fuzzVol = AC.createGain();         fuzzVol.gain.value = FX.vol * 1.2;
  bypassGain = AC.createGain();      bypassGain.gain.value = 0;

  fuzzIn.connect(fuzzWS); fuzzWS.connect(fuzzTone);
  fuzzTone.connect(fuzzVol); fuzzVol.connect(master);
  bypassGain.connect(master);

  drumFuzzGain = AC.createGain(); drumFuzzGain.gain.value = 0;
  drumDryGain  = AC.createGain(); drumDryGain.gain.value  = 1;
  drumFuzzGain.connect(fuzzIn);
  drumDryGain.connect(master);

  applyFuzzCurve();
}

function applyFuzzCurve() {
  fuzzWS.curve = makeFuzzCurve(FX.fuzz);
  fuzzTone.gain.value = (FX.tone - 0.5) * 24;
  fuzzVol.gain.value  = fuzzOn ? FX.vol * 1.2 : 0;
  bypassGain.gain.value = fuzzOn ? 0 : 0.9;
}

  v.osc2.connect(v.mix); v.osc.connect(v.filt); v.mix.connect(v.filt);

// ── Reverb ─────────────────────────────────────────────
function makeReverb() {
  var r=AC.sampleRate, l=r*2.0, b=AC.createBuffer(2,l,r);
  for (var c=0;c<2;c++){var d=b.getChannelData(c);for(var i=0;i<l;i++){var dec=Math.pow(1-i/l,1.8);d[i]=(Math.random()*2-1)*dec*.3+Math.sin(i*.012)*dec*.22;}}
  return b;
}

// ── Sequencer ──────────────────────────────────────────
var schedId = null;
function bl() { return 60/tempo/4; }

var touchDown = false, activeNi = -1;

function schedule() {
  var now = AC.currentTime;
  while (nextTime < now + AHEAD) {
    var s  = seqStep;
    // Loop grid cycles over activeSteps*4 bars, matching the drum pattern length
    var effectiveLoopLen = activeSteps * 4;
    var ls = loopAbsStep % effectiveLoopLen;

    if (drumsOn) {
      var effectiveLoop = activeSteps * 4;
      var barLen = activeSteps;
      var posInLoop = ls % effectiveLoop;
      var inFillZone = fillEnabled && (posInLoop >= (effectiveLoop - barLen));
      var fillPos = posInLoop - (effectiveLoop - barLen);
      var thisCycle = Math.floor(loopAbsStep / effectiveLoop);

      // Pick a new random fill at the start of each fill bar
      if (inFillZone && fillPos === 0 && thisCycle !== lastFillCycle) {
        currentFill = FILL_POOL[Math.floor(Math.random() * FILL_POOL.length)];
        lastFillCycle = thisCycle;
      }

      if (inFillZone && currentFill) {
        if (currentFill.kick[fillPos])  playKick(nextTime);
        if (currentFill.snare[fillPos]) playSnare(nextTime);
        if (currentFill.tom[fillPos])   playTom(nextTime);
        if (currentFill.hihat[fillPos]) playHihat(nextTime);
      } else {
        if (D.kick.s[s])  playKick(nextTime);
        if (D.snare.s[s]) playSnare(nextTime);
        if (D.tom.s[s])   playTom(nextTime);
        if (D.hihat.s[s]) playHihat(nextTime);
      }
    }

    if (touchDown && activeNi >= 0) {
      playGuitarNote(activeNi, nextTime);
      loopGrid[ls] = activeNi;
    } else if (loopGrid[ls] >= 0) {
      playGuitarNote(loopGrid[ls], nextTime);
    }

    (function(ss,lss,ell){ requestAnimationFrame(function(){ updateStepUI(ss,lss,ell); }); }(s,ls,effectiveLoopLen));
    nextTime += bl();
    seqStep = (seqStep + 1) % activeSteps;
    loopAbsStep++;
  }
}

function startSeq() {
  playing = true; seqStep = 0; loopAbsStep = 0; nextTime = AC.currentTime + 0.05;
  schedId = setInterval(schedule, TICK);
}
function stopSeq() {
  playing = false; clearInterval(schedId);
  document.querySelectorAll('.sbtn.cur').forEach(function(b){b.classList.remove('cur');});
}

var _uiStep = -1;
function updateStepUI(s, ls, ell) {
  if (s !== _uiStep) {
    _uiStep = s;
    if (s % 4 === 0) {
      var f = document.getElementById('bflash');
      f.classList.add('f'); setTimeout(function(){f.classList.remove('f');},55);
    }
    Object.keys(D).forEach(function(type) {
      var p = document.querySelector('#row-'+type+' .sbtn.cur');
      if (p) p.classList.remove('cur');
      var c = document.querySelector('#row-'+type+' .sbtn[data-s="'+s+'"]');
      if (c) c.classList.add('cur');
    });
  }
  var lpb = document.getElementById('lpb');
  if (lpb) lpb.style.width = ((ls / (ell||LOOP_STEPS)) * 100) + '%';
}

// ── String touch ───────────────────────────────────────
function flashNote(ni) {
  document.querySelectorAll('.nzone').forEach(function(z,i){z.classList.toggle('act',i===ni);});
  var sl = document.getElementById('sl');
  sl.classList.remove('pluck'); void sl.offsetWidth; sl.classList.add('pluck');
  setTimeout(function(){sl.classList.remove('pluck');},160);
}
function yToNi(y) {
  var r = document.getElementById('sc').getBoundingClientRect();
  var pct = Math.max(0,Math.min(1,(y-r.top)/r.height));
  return Math.round(pct*(NOTES.length-1));
}
function onDown(y){var ni=yToNi(y);touchDown=true;activeNi=ni;flashNote(ni);}
function onMove(y){if(!touchDown)return;var ni=yToNi(y);if(ni!==activeNi){activeNi=ni;flashNote(ni);}}
function onUp(){touchDown=false;activeNi=-1;setTimeout(function(){document.querySelectorAll('.nzone').forEach(function(z){z.classList.remove('act');});},110);}
function setupString(){
  var sc=document.getElementById('sc');
  sc.addEventListener('touchstart',function(e){e.preventDefault();onDown(e.touches[0].clientY);},{passive:false});
  sc.addEventListener('touchmove', function(e){e.preventDefault();onMove(e.touches[0].clientY);},{passive:false});
  sc.addEventListener('touchend',  function(e){e.preventDefault();onUp();},{passive:false});
  sc.addEventListener('mousedown', function(e){onDown(e.clientY);});
  sc.addEventListener('mousemove', function(e){onMove(e.clientY);});
  document.addEventListener('mouseup',function(){if(touchDown)onUp();});
}

// ── Note randomizer ────────────────────────────────────
function randomizeNotes(){
  var pool=NOTE_POOLS[Math.floor(Math.random()*NOTE_POOLS.length)];
  NOTES=pool.map(function(n){return {name:n.name,f:n.f};});
  for(var i=0;i<LOOP_STEPS;i++) loopGrid[i]=-1;
  document.querySelectorAll('.nlbl').forEach(function(lbl,i){lbl.textContent=NOTES[i]?NOTES[i].name:'';});
  document.getElementById('stxt').textContent='Scale: '+NOTES[0].name+'-'+NOTES[5].name+' - Loop cleared';
}

      e.preventDefault();
      var tt=this.dataset.dtype;
      drumVariant[tt]=(drumVariant[tt]+1)%10;
      this.textContent=DRUM_SOUND_NAMES[tt][drumVariant[tt]];
      // preview the sound
      if(AC) { var previewT=AC.currentTime+0.05; if(tt==='kick')playKick(previewT); else if(tt==='snare')playSnare(previewT); else if(tt==='tom')playTom(previewT); else playHihat(previewT); }
    },{passive:false});
    scb.addEventListener('mousedown',function(){
      var tt=this.dataset.dtype;
      drumVariant[tt]=(drumVariant[tt]+1)%10;
      this.textContent=DRUM_SOUND_NAMES[tt][drumVariant[tt]];
      if(AC) { var previewT=AC.currentTime+0.05; if(tt==='kick')playKick(previewT); else if(tt==='snare')playSnare(previewT); else if(tt==='tom')playTom(previewT); else playHihat(previewT); }
    });
    row.append(lbl,sr,scb,db); sec.appendChild(row);
  });
}
function randDrum(t){var p=PATS[t];D[t].s=p[Math.floor(Math.random()*p.length)].slice();buildDrums();}
function randAll(){Object.keys(D).forEach(randDrum);}

// ── Step counter UI ────────────────────────────────────
function updateStepDisplay(){
  document.getElementById('step-val').textContent=activeSteps;
  // Dim inactive steps in all drum rows
  document.querySelectorAll('.sbtn').forEach(function(b){
    var s=parseInt(b.dataset.s,10);
    b.classList.toggle('inactive', s >= activeSteps);
  });
}

// ── SVG Die ────────────────────────────────────────────
var PIP_LAYOUTS={1:[[13,13]],2:[[7,7],[19,19]],3:[[7,7],[13,13],[19,19]],4:[[7,7],[19,7],[7,19],[19,19]],5:[[7,7],[19,7],[13,13],[7,19],[19,19]],6:[[7,7],[19,7],[7,13],[19,13],[7,19],[19,19]]};
var SVG_NS='http://www.w3.org/2000/svg';

function makeDieSVG(size,face){
  var svg=document.createElementNS(SVG_NS,'svg');
  svg.setAttribute('viewBox','0 0 26 26'); svg.setAttribute('width',size); svg.setAttribute('height',size);
  svg.style.display='block'; svg.style.overflow='visible';
  var rect=document.createElementNS(SVG_NS,'rect');
  rect.setAttribute('x','1');rect.setAttribute('y','1');rect.setAttribute('width','24');rect.setAttribute('height','24');rect.setAttribute('rx','4');
  rect.setAttribute('fill','#1a1208');rect.setAttribute('stroke','#c8a84b');rect.setAttribute('stroke-width','1.5');
  svg.appendChild(rect); setPips(svg,face); return svg;
}
function setPips(svg,face){
  while(svg.childNodes.length>1) svg.removeChild(svg.lastChild);
  (PIP_LAYOUTS[face]||PIP_LAYOUTS[1]).forEach(function(pos){
    var c=document.createElementNS(SVG_NS,'circle');
    c.setAttribute('cx',pos[0]);c.setAttribute('cy',pos[1]);c.setAttribute('r','2.2');c.setAttribute('fill','#f0c84a');
    svg.appendChild(c);
  });
}
function animateDie(svg,cb){
  var count=0, total=8, parent=svg.parentNode;
  var shakes=['-12deg','10deg','-8deg','6deg','-5deg','4deg','-2deg','0deg'];
  var id=setInterval(function(){
    if(parent&&shakes[count]) parent.style.transform='rotate('+shakes[count]+')';
    setPips(svg,Math.floor(Math.random()*6)+1);
    count++;
    if(count>=total){
      clearInterval(id);
      if(parent) parent.style.transform='';
      setPips(svg,Math.floor(Math.random()*6)+1);
      if(cb) cb();
    }
  },55);
}
function makeDieBtn(size,action){
  var btn=document.createElement('button');
  btn.className='die-btn'; btn.style.width=size+'px'; btn.style.height=size+'px';
  var svg=makeDieSVG(size,Math.floor(Math.random()*6)+1);
  btn.appendChild(svg);
  var fired=false;
  var press=function(e){
    e.preventDefault();
    if(fired) return; fired=true; setTimeout(function(){fired=false;},400);
    animateDie(svg,action);
  };
  btn.addEventListener('touchstart',press,{passive:false});
  btn.addEventListener('mousedown',press);
  return btn;
}

// ── Knobs ──────────────────────────────────────────────
function knob(el,get,set,min,max){
  var rot=function(v){return -140+((v-min)/(max-min))*280;};
  el.style.transform='rotate('+rot(get())+'deg)';
  var sy=0,sv=0;
  var mv=function(e){
    e.preventDefault();
    var y=e.touches?e.touches[0].clientY:e.clientY;
    var nv=Math.max(min,Math.min(max,sv+(sy-y)/90*(max-min)));
    set(nv); el.style.transform='rotate('+rot(nv)+'deg)';
  };
  var up=function(){document.removeEventListener('touchmove',mv,{passive:false});document.removeEventListener('mousemove',mv);};
  el.addEventListener('touchstart',function(e){e.preventDefault();sy=e.touches[0].clientY;sv=get();document.addEventListener('touchmove',mv,{passive:false});document.addEventListener('touchend',up,{once:true});},{passive:false});
  el.addEventListener('mousedown',function(e){sy=e.clientY;sv=get();document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up,{once:true});});
}

// ── Note zones ─────────────────────────────────────────
function buildNotes(){
  var sc=document.getElementById('sc');
  var h=sc.clientHeight||400;
  NOTES.forEach(function(n,i){
    var z=document.createElement('div'); z.className='nzone';
    z.style.top=(i/(NOTES.length-1))*(h-30)+'px';
    var dot=document.createElement('div'); dot.className='ndot';
    var lbl=document.createElement('div'); lbl.className='nlbl'; lbl.textContent=n.name;
    z.append(dot,lbl); sc.appendChild(z);
  });
}

// ── BOOT ───────────────────────────────────────────────
async function boot(){
  AC=new(window.AudioContext||window.webkitAudioContext)({latencyHint:'interactive',sampleRate:44100});
  await AC.resume();

  comp=AC.createDynamicsCompressor();
  comp.threshold.value=-16;comp.knee.value=8;comp.ratio.value=3.5;comp.attack.value=0.003;comp.release.value=0.2;
  comp.connect(AC.destination);

  master=AC.createGain(); master.gain.value=0.8; master.connect(comp);
  verb=AC.createConvolver(); verb.buffer=makeReverb();
  verbGain=AC.createGain(); verbGain.gain.value=1;
  verb.connect(verbGain); verbGain.connect(master);

  buildFuzzChain();
  voices=[];
  for(var _v=0;_v<POOL;_v++) voices.push(buildVoice());

  document.getElementById('init').style.display='none';
  document.getElementById('app').classList.add('on');
  // Force a layout so the app is visible before heavy audio init
  document.getElementById('app').getBoundingClientRect();

  buildNotes(); buildDrums(); setupString();

  // Note rand die
  var nrb=document.getElementById('note-rand-btn');
  var nrbSvg=makeDieSVG(34,3);
  nrb.insertBefore(nrbSvg,nrb.firstChild);
  var nrbFired=false;
  var nrbPress=function(e){
    e.preventDefault();
    if(nrbFired)return; nrbFired=true; setTimeout(function(){nrbFired=false;},400);
    animateDie(nrbSvg,randomizeNotes);
  };
  nrb.addEventListener('touchstart',nrbPress,{passive:false});
  nrb.addEventListener('mousedown',nrbPress);

  // Rand-all die
  var rallBtn=document.getElementById('rall');
  var rallSvg=makeDieSVG(36,6);
  rallBtn.insertBefore(rallSvg,rallBtn.firstChild);
  var rallFired=false;
  var rallPress=function(e){
    e.preventDefault();
    if(rallFired)return; rallFired=true; setTimeout(function(){rallFired=false;},400);
    animateDie(rallSvg,randAll);
  };
  rallBtn.addEventListener('touchstart',rallPress,{passive:false});
  rallBtn.addEventListener('mousedown',rallPress);

  // Tempo slider
  document.getElementById('tslider').addEventListener('input',function(e){
    tempo=parseInt(e.target.value);
    document.getElementById('tbpm').textContent=tempo+' BPM';
  });

  // Step counter
  var stepDn=document.getElementById('step-dn');
  var stepUp=document.getElementById('step-up');
  var pressStepDn=function(e){e.preventDefault();if(activeSteps>1){activeSteps--;updateStepDisplay();}};
  var pressStepUp=function(e){e.preventDefault();if(activeSteps<MAX_STEPS){activeSteps++;updateStepDisplay();}};
  stepDn.addEventListener('touchstart',pressStepDn,{passive:false});
  stepDn.addEventListener('mousedown',pressStepDn);
  stepUp.addEventListener('touchstart',pressStepUp,{passive:false});
  stepUp.addEventListener('mousedown',pressStepUp);

  // Drums on/off
  var dtog=function(){
    drumsOn=!drumsOn;
    document.getElementById('dstmp').classList.toggle('on',drumsOn);
    document.getElementById('dled').classList.toggle('on',drumsOn);
  };
  document.getElementById('dstmp').addEventListener('touchstart',function(e){e.preventDefault();dtog();},{passive:false});
  document.getElementById('dstmp').addEventListener('click',dtog);

  // Fuzz on/off
  var ftog=function(){
    fuzzOn=!fuzzOn;
    var fv=fuzzOn?1:0, bv=fuzzOn?0:1;
    voices.forEach(function(v){v.fuzzSend.gain.value=fv; v.bypassSend.gain.value=bv;});
    fuzzVol.gain.value=fuzzOn?FX.vol*1.2:0;
    bypassGain.gain.value=fuzzOn?0:0.9;
    document.getElementById('fstmp').classList.toggle('on',fuzzOn);
    document.getElementById('fled').classList.toggle('on',fuzzOn);
  };
  document.getElementById('fstmp').addEventListener('touchstart',function(e){e.preventDefault();ftog();},{passive:false});
  document.getElementById('fstmp').addEventListener('click',ftog);

  // Fill on loop toggle
  var fillTog = function() {
    fillEnabled = !fillEnabled;
    document.getElementById('fill-btn').classList.toggle('on', fillEnabled);
  };
  document.getElementById('fill-btn').addEventListener('touchstart', function(e){ e.preventDefault(); fillTog(); }, {passive:false});
  document.getElementById('fill-btn').addEventListener('click', fillTog);

  // Drums through fuzz toggle
  var dftog=function(){
    drumsFuzz=!drumsFuzz;
    drumFuzzGain.gain.value=drumsFuzz?1:0;
    drumDryGain.gain.value=drumsFuzz?0:1;
    document.getElementById('drum-fuzz-sw').classList.toggle('on',drumsFuzz);
  };
  var dfBtn=document.getElementById('drum-fuzz-sw');
  dfBtn.addEventListener('touchstart',function(e){e.preventDefault();dftog();},{passive:false});
  dfBtn.addEventListener('click',dftog);

  // Knobs
  knob(document.getElementById('kfuzz'),function(){return FX.fuzz;},function(v){FX.fuzz=v;applyFuzzCurve();},0,1);
  knob(document.getElementById('ktone'),function(){return FX.tone;},function(v){FX.tone=v;applyFuzzCurve();},0,1);
  knob(document.getElementById('kvol'), function(){return FX.vol;}, function(v){FX.vol=v; applyFuzzCurve();},0,1);
  knob(document.getElementById('krv'),  function(){return FX.verbMix;},function(v){FX.verbMix=v;verbGain.gain.value=v;},0,1);

  startSeq();
}

(function(){
  var booted = false;
  function tryBoot(e) {
    if (booted) return;
    booted = true;
    boot();
  }
  var btn = document.getElementById('sbtn');
  // touchend is the reliable trigger on iOS — AudioContext allowed here, no preventDefault needed
  btn.addEventListener('touchend', function(e) {
    e.preventDefault(); // stop the subsequent click from firing
    tryBoot(e);
  }, {passive:false});
  // fallback for desktop / non-touch
  btn.addEventListener('click', tryBoot);
}());
</script>
